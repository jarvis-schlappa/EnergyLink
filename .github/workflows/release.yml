name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading "v" if present
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Update package.json version
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
          echo "Updated package.json to ${{ steps.version.outputs.version }}"

      - name: Verify build
        run: |
          npm ci
          npm run check
          npm test
          npm run build

      - name: Commit version bump and move tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main

          # Move the release tag to include the version bump commit
          # so build-info.ts resolves the clean version (not -dev+hash)
          TAG="${{ github.event.release.tag_name }}"
          git tag -f "$TAG"
          git push origin "$TAG" --force
